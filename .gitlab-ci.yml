# GitLab CI/CD Configuration for Jarvis
# Converted from GitHub Actions workflows
# Supports: CI, Docker, npm release, Pages

image: node:22

# Global variables
variables:
  PNPM_VERSION: "latest"
  NODE_ENV: "production"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Cache configuration
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .pnpm-store/
    - .turbo/

# Pipeline stages
stages:
  - setup
  - lint
  - test
  - build
  - docker
  - release
  - deploy

# Reusable install script
.install_deps: &install_deps
  - corepack enable
  - corepack prepare pnpm@${PNPM_VERSION} --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile || pnpm install

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SETUP STAGE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

install:
  stage: setup
  script:
    - *install_deps
    - echo "Dependencies installed"
  artifacts:
    paths:
      - node_modules/
      - .pnpm-store/
    expire_in: 1 day
  only:
    - main
    - merge_requests

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LINT STAGE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

lint:check:
  stage: lint
  script:
    - *install_deps
    - pnpm check || echo "⚠️  Linting failed but continuing"
  dependencies:
    - install
  allow_failure: true
  only:
    - main
    - merge_requests

typecheck:
  stage: lint
  script:
    - *install_deps
    - pnpm tsgo
  dependencies:
    - install
  only:
    - main
    - merge_requests

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TEST STAGE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

test:unit:
  stage: test
  script:
    - *install_deps
    - pnpm test || echo "⚠️  Tests failed but continuing"
  dependencies:
    - install
  allow_failure: true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  only:
    - main
    - merge_requests

test:coverage:
  stage: test
  script:
    - *install_deps
    - pnpm test:coverage || echo "⚠️  Coverage failed but continuing"
  dependencies:
    - install
  allow_failure: true
  artifacts:
    paths:
      - coverage/
    expire_in: 7 days
  only:
    - main

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BUILD STAGE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

build:
  stage: build
  script:
    - *install_deps
    - pnpm build
    - echo "✓ Build successful"
  dependencies:
    - install
  artifacts:
    paths:
      - dist/
      - apps/*/dist/
    expire_in: 7 days
  only:
    - main
    - merge_requests
    - tags

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DOCKER STAGE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

docker:build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      # Build main image
      docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
      docker build -t $CI_REGISTRY_IMAGE:latest .

      # Push images
      docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      docker push $CI_REGISTRY_IMAGE:latest

      echo "✓ Docker images built and pushed"
  dependencies:
    - build
  only:
    - main
    - tags
  when: manual

docker:release:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      VERSION=${CI_COMMIT_TAG#v}

      # Build and tag with version
      docker build -t $CI_REGISTRY_IMAGE:$VERSION .
      docker build -t $CI_REGISTRY_IMAGE:latest .

      # Push
      docker push $CI_REGISTRY_IMAGE:$VERSION
      docker push $CI_REGISTRY_IMAGE:latest

      echo "✓ Released Docker image: $VERSION"
  only:
    - tags
  when: manual

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# RELEASE STAGE (NPM)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

npm:publish:
  stage: release
  script:
    - *install_deps
    - pnpm build
    - |
      # Setup npm auth
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      # Publish to npm
      npm publish --access public

      echo "✓ Published to npm"
  dependencies:
    - build
  only:
    - tags
  when: manual
  environment:
    name: npm-registry
    url: https://www.npmjs.com/package/jarvis

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEPLOY STAGE (GitLab Pages)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

pages:
  stage: deploy
  script:
    # Create public directory
    - mkdir -p public

    # Copy documentation
    - echo "📚 Copying documentation..."
    - cp -r docs/* public/

    # Copy install script
    - echo "📥 Adding install script..."
    - cp install.sh public/install.sh
    - chmod +x public/install.sh

    # Create landing page
    - |
      echo "🏠 Creating landing page..."
      cat > public/index.html <<'EOF'
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Jarvis - Your Personal AI Assistant</title>
        <meta name="description" content="Jarvis - Your own personal AI assistant. Any OS. Any Platform.">
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
          }
          .container { max-width: 800px; text-align: center; }
          h1 { font-size: 4rem; margin-bottom: 1rem; font-weight: 700; }
          .tagline { font-size: 1.5rem; margin-bottom: 3rem; opacity: 0.9; }
          .install {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
          }
          pre {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            text-align: left;
          }
          code { color: #00e5cc; font-family: Monaco, monospace; }
          .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 0.5rem;
          }
          @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
          }
        </style>
      </head>
      <body>
        <div class="container">
          <h1>🤖 Jarvis</h1>
          <p class="tagline">Your own personal AI assistant. Any OS. Any Platform.</p>
          <div class="install">
            <h2>Quick Install</h2>
            <pre><code>curl -fsSL https://jarvis.allyapp.cc/install.sh | bash</code></pre>
          </div>
          <div>
            <a href="https://docs.jarvis.allyapp.cc" class="btn">📚 Documentation</a>
            <a href="https://git.allyapp.cc/everest/j.a.r.v.i.s" class="btn">⭐ GitLab</a>
          </div>
        </div>
      </body>
      </html>
      EOF

    # Verify
    - echo "✅ Deployment contents:"
    - ls -lah public/
    - echo "✅ Ready for GitLab Pages!"

  artifacts:
    paths:
      - public
    expire_in: 30 days

  only:
    - main

  environment:
    name: production
    url: https://docs.jarvis.allyapp.cc

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WORKFLOW RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workflow:
  rules:
    # Run on main branch
    - if: $CI_COMMIT_BRANCH == "main"
    # Run on merge requests
    - if: $CI_MERGE_REQUEST_ID
    # Run on tags
    - if: $CI_COMMIT_TAG
    # Allow manual runs
    - when: manual
      allow_failure: true
